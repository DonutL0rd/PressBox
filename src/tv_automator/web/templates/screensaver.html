<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PressBox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0e0603;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #f0e0c8;
  }

  /* Subtle grain texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.35;
  }

  /* Background gradient — espresso to dark roast */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 30% 40%, rgba(30, 12, 5, 0.6) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(12, 44, 86, 0.15) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  .container {
    position: absolute; z-index: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 36px;
    animation: fadeIn 1.2s ease-in;
    transition: transform 8s cubic-bezier(0.45, 0.05, 0.55, 0.95);
    /* leave room on all sides so content never clips when shifted */
    width: calc(100% - 160px);
    height: calc(100% - 160px);
    top: 80px; left: 80px;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Deep-dim overlay — fades in/out via JS class toggle */
  #dim-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 3s ease-in-out;
  }
  #dim-overlay.dimming { opacity: 0.97; }

  /* Clock */
  .clock-block { text-align: center; transition: all 0.8s ease; }

  .clock {
    font-size: 8rem; font-weight: 200; letter-spacing: -4px;
    color: rgba(240, 224, 200, 0.78); line-height: 1;
    transition: font-size 0.8s ease;
  }
  .clock-date {
    font-size: 1.3rem; font-weight: 400;
    color: rgba(195, 148, 95, 0.75);
    margin-top: 10px;
    transition: font-size 0.8s ease;
  }

  /* Shrink clock when music is prominently displayed */
  .container.has-music .clock { font-size: 5rem; letter-spacing: -2px; }
  .container.has-music .clock-date { font-size: 1rem; margin-top: 6px; }

  /* Game card */
  .upcoming { text-align: center; max-width: 720px; transition: all 0.8s ease; }

  .upcoming-label {
    font-size: 0.8rem; font-weight: 700;
    color: rgba(185, 140, 80, 0.6);
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 18px;
  }
  .upcoming-label.live-label {
    color: rgba(0, 160, 120, 0.85);
  }

  .next-game {
    background: rgba(35, 16, 7, 0.75);
    border: 1px solid rgba(100, 60, 25, 0.45);
    border-radius: 18px;
    padding: 26px 44px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 220, 150, 0.06);
    transition: all 0.8s ease;
  }
  .next-game.live-game {
    border-color: rgba(0, 120, 100, 0.5);
    box-shadow: 0 4px 32px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 140, 110, 0.2), inset 0 1px 0 rgba(0, 200, 160, 0.06);
  }

  /* Compact game card when music is showing */
  .container.has-music .next-game { padding: 14px 30px; gap: 7px; }
  .container.has-music .upcoming-label { font-size: 0.7rem; margin-bottom: 10px; }

  .next-matchup {
    display: flex; align-items: center; gap: 28px;
  }
  .next-team { font-size: 3rem; font-weight: 800; color: rgba(240, 224, 200, 0.78); transition: font-size 0.8s ease; }
  .next-team.favorite { color: rgba(26, 154, 138, 0.82); }
  .container.has-music .next-team { font-size: 1.9rem; }
  .next-at { font-size: 1.1rem; color: rgba(185, 140, 80, 0.55); font-weight: 400; }

  .next-time { font-size: 0.95rem; color: rgba(185, 145, 95, 0.7); }
  .next-countdown { font-size: 1.05rem; color: #1a9a8a; font-weight: 600; }

  .score-display {
    font-size: 1.1rem; color: rgba(240, 224, 200, 0.5); font-weight: 500;
    letter-spacing: 0.05em;
  }

  .no-games { color: rgba(185, 140, 80, 0.4); font-size: 1rem; }

  /* Auto-play indicator */
  .autoplay-status {
    display: flex; align-items: center; gap: 10px;
    background: rgba(12, 44, 86, 0.35);
    border: 1px solid rgba(26, 154, 138, 0.25);
    border-radius: 24px;
    padding: 10px 22px;
    font-size: 0.85rem;
  }
  .autoplay-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #1a9a8a;
    box-shadow: 0 0 8px rgba(26, 154, 138, 0.7);
    flex-shrink: 0;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .autoplay-text { color: rgba(185, 200, 210, 0.8); }
  .autoplay-game { color: #c4ced4; font-weight: 600; margin-left: 4px; }
  .autoplay-feed { color: rgba(26, 154, 138, 0.8); font-size: 0.75rem; margin-left: 6px; }

  .autoplay-off {
    background: rgba(20, 10, 4, 0.4);
    border: 1px solid rgba(100, 60, 25, 0.25);
    border-radius: 24px;
    padding: 10px 22px;
    font-size: 0.82rem;
    color: rgba(150, 110, 70, 0.4);
  }

  /* ── Now Playing music (base = small) ── */
  .now-playing-music {
    display: flex; align-items: center; gap: 18px;
    background: rgba(35, 16, 7, 0.75);
    border: 1px solid rgba(100, 60, 25, 0.45);
    border-radius: 18px;
    padding: 18px 28px;
    box-shadow: 0 4px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 220, 150, 0.06);
    max-width: 560px;
  }
  .npm-art {
    width: 72px; height: 72px; border-radius: 10px; object-fit: cover;
    flex-shrink: 0; background: rgba(20, 10, 4, 0.6);
  }
  .npm-info { min-width: 0; flex: 1; }
  .npm-label {
    font-size: 0.7rem; font-weight: 700;
    color: rgba(26, 154, 138, 0.8);
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 6px;
  }
  .npm-title {
    font-size: 1.2rem; font-weight: 600;
    color: rgba(240, 224, 200, 0.85);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .npm-artist {
    font-size: 0.88rem; color: rgba(185, 145, 95, 0.7);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }
  .npm-progress {
    margin-top: 8px; display: flex; align-items: center; gap: 8px;
  }
  .npm-bar-bg {
    flex: 1; height: 3px; border-radius: 2px;
    background: rgba(100, 60, 25, 0.4);
    overflow: hidden;
  }
  .npm-bar-fill {
    height: 100%; border-radius: 2px;
    background: rgba(26, 154, 138, 0.7);
    transition: width 2s linear;
  }
  .npm-time {
    font-size: 0.7rem; color: rgba(185, 145, 95, 0.5);
    font-variant-numeric: tabular-nums;
    min-width: 32px;
  }

  /* ── Medium size ── */
  #music-block.npm-medium .now-playing-music {
    padding: 24px 38px; gap: 26px; max-width: 740px;
  }
  #music-block.npm-medium .npm-art { width: 116px; height: 116px; border-radius: 14px; }
  #music-block.npm-medium .npm-label { font-size: 0.78rem; }
  #music-block.npm-medium .npm-title { font-size: 1.75rem; }
  #music-block.npm-medium .npm-artist { font-size: 1.1rem; }
  #music-block.npm-medium .npm-time { font-size: 0.76rem; min-width: 36px; }
  #music-block.npm-medium .npm-bar-bg { height: 4px; }

  /* ── Large size — vertical layout ── */
  #music-block.npm-large .now-playing-music {
    flex-direction: column; align-items: center; text-align: center;
    max-width: 540px; padding: 38px 52px; gap: 18px;
  }
  #music-block.npm-large .npm-art {
    width: 230px; height: 230px; border-radius: 22px; flex-shrink: 0;
  }
  #music-block.npm-large .npm-info { min-width: 0; width: 100%; }
  #music-block.npm-large .npm-label { font-size: 0.82rem; margin-bottom: 8px; }
  #music-block.npm-large .npm-title {
    font-size: 2.5rem; font-weight: 700;
    white-space: normal; overflow: visible; text-overflow: clip;
    text-align: center; line-height: 1.15;
  }
  #music-block.npm-large .npm-artist { font-size: 1.45rem; text-align: center; }
  #music-block.npm-large .npm-time { font-size: 0.85rem; min-width: 42px; }
  #music-block.npm-large .npm-bar-bg { height: 5px; }
  #music-block.npm-large .npm-progress { margin-top: 12px; }
</style>
</head>
<body>
<div id="dim-overlay"></div>
<div class="container" id="container">
  <div class="clock-block">
    <div class="clock" id="clock"></div>
    <div class="clock-date" id="clock-date"></div>
  </div>
  <!-- music-block is first so it appears above the game card when playing -->
  <div id="music-block"></div>
  <div class="upcoming" id="upcoming"></div>
  <div id="autoplay-block"></div>
</div>
<script>
(function() {
  let favorites = new Set();
  let npmSize = 'medium'; // overridden by settings

  const TZ = 'America/Los_Angeles';

  function updateClock() {
    const now = new Date();
    const parts = now.toLocaleString('en-US', { timeZone: TZ, hour: 'numeric', minute: '2-digit', hour12: true }).split(' ');
    const timeParts = parts[0].split(':');
    document.getElementById('clock').textContent =
      timeParts[0] + ':' + timeParts[1];
    document.getElementById('clock-date').textContent =
      now.toLocaleDateString('en-US', { timeZone: TZ, weekday: 'long', month: 'long', day: 'numeric' });
  }

  function formatCountdown(ms) {
    if (ms <= 0) return 'Starting now';
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    if (h > 0) return 'Starts in ' + h + 'h ' + m + 'm';
    return 'Starts in ' + m + 'm';
  }

  function connectWs() {
    var protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    var ws = new WebSocket(protocol + '//' + window.location.host + '/ws');
    
    ws.onmessage = function(e) {
      try {
        var data = JSON.parse(e.data);
        if (data.type === 'games') {
          if (Array.isArray(data.games)) renderUpcoming(data.games);
        } else if (data.type === 'music') {
          currentMusic = data;
          renderMusic(data);
        } else if (data.type === 'autoplay') {
          currentAutoplay = data;
          renderAutoplay(currentAutoplay, currentSettings);
        } else if (data.type === 'settings') {
          currentSettings = data;
          if (data.screensaver_music_size) {
            npmSize = data.screensaver_music_size;
            if (currentMusic) renderMusic(currentMusic);
          }
          var wanted = !!data.dvd_bounce;
          if (wanted !== dvdBounce) {
            dvdBounce = wanted;
            if (dvdBounce) enableDvdBounce();
            else disableDvdBounce();
          }
          renderAutoplay(currentAutoplay, currentSettings);
        }
      } catch (err) {}
    };
    
    ws.onclose = function() {
      setTimeout(connectWs, 3000);
    };
  }

  let currentSettings = null;
  let currentMusic = null;
  let currentAutoplay = null;

  async function init() {
    try {
      var fRes = await fetch('/api/favorites');
      if (fRes.ok) {
        var fData = await fRes.json();
        favorites = new Set(fData.teams || []);
      }
    } catch(e) {}
    connectWs();
  }

  updateClock();
  setInterval(updateClock, 1000);
  init();

  // Start with random shift
  startRandomShift();
})();
</script>
</body>
</html>
