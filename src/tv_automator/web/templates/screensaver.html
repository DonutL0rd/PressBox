<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambient PressBox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #050505;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0a0;
    --text-muted: #404040;
    --accent: #1a9a8a;
    --live-red: #e74c3c;
    --transition-lazy: all 2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background-color: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }

  /* Ambient Background */
  #ambient-bg {
    position: fixed; inset: 0;
    z-index: 0;
    background: radial-gradient(circle at 50% 50%, #101010 0%, #050505 100%);
    transition: var(--transition-lazy);
  }

  #album-glow {
    position: fixed; inset: -10%;
    z-index: 1;
    opacity: 0;
    filter: blur(120px) saturate(1.8);
    transition: opacity 4s ease;
    object-fit: cover;
    width: 120%; height: 120%;
    animation: slow-glow 60s infinite alternate ease-in-out;
  }

  @keyframes slow-glow {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(2%, 2%) scale(1.1) rotate(2deg); }
  }

  body.has-music #album-glow {
    opacity: 0.15;
  }

  /* Main Stage */
  .stage {
    position: relative;
    z-index: 10;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px;
    transition: padding 2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body.has-music .stage {
    padding: 60px 80px;
  }

  /* Audio Side */
  .audio-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 40px;
    opacity: 0;
    transform: translateX(-50px);
    transition: var(--transition-lazy);
    max-width: 0;
    overflow: hidden;
  }

  body.has-music .audio-wrap {
    opacity: 1;
    transform: translateX(0);
    max-width: 600px;
    margin-right: 60px;
  }

  #album-art {
    width: 500px; height: 500px;
    border-radius: 8px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.9);
    object-fit: cover;
    transition: opacity 1.5s ease;
  }

  .track-meta {
    max-width: 500px;
  }

  .track-title {
    font-size: 2.8rem;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.03em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-artist {
    font-size: 1.6rem;
    color: var(--text-secondary);
    font-weight: 400;
  }

  /* Schedule Section */
  .schedule-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    transition: var(--transition-lazy);
    max-width: 900px;
    transform-origin: center center;
  }

  body.has-music .schedule-wrap {
    margin-left: 0;
    align-items: center;
    text-align: center;
    flex: 1.5;
  }

  .schedule-header {
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 50px;
    transition: var(--transition-lazy);
  }

  body.has-music .schedule-header {
    margin-bottom: 40px;
    font-size: 1.1rem;
  }

  /* Game Card Carousel */
  .game-carousel {
    position: relative;
    width: 100%;
    min-height: 320px;
  }

  .game-card {
    position: absolute;
    top: 0; left: 0; right: 0;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1.2s ease, transform 1.2s ease;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  body.has-music .game-card {
    align-items: center;
  }

  .game-card.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .game-scoreboard {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .team-row {
    display: flex;
    align-items: baseline;
    gap: 24px;
  }

  .team-abbr {
    font-size: 4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    min-width: 180px;
    transition: var(--transition-lazy);
  }

  body.has-music .team-abbr {
    font-size: 3.5rem;
    min-width: 150px;
  }

  .team-score {
    font-size: 4rem;
    font-weight: 200;
    line-height: 1;
    color: var(--text-primary);
    min-width: 60px;
    transition: var(--transition-lazy);
  }

  body.has-music .team-score {
    font-size: 3.5rem;
  }

  .team-name {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-left: 4px;
  }

  body.has-music .team-name {
    font-size: 0.75rem;
  }

  .game-divider {
    width: 60px;
    height: 1px;
    background: var(--text-muted);
    opacity: 0.3;
    margin: 4px 0;
  }

  .game-status {
    font-size: 1.3rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .game-status.live {
    color: var(--live-red);
  }

  .game-status.final {
    color: var(--text-secondary);
  }

  .game-status.scheduled {
    color: var(--accent);
  }

  .game-detail {
    font-size: 1rem;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 4px;
  }

  /* Pips */
  .schedule-pips {
    display: flex;
    gap: 8px;
    margin-top: 50px;
    transition: var(--transition-lazy);
  }

  body.has-music .schedule-pips {
    margin-top: 30px;
  }

  .pip {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.6s ease, transform 0.6s ease;
  }

  .pip.active {
    background: var(--accent);
    transform: scale(1.5);
  }

  .pip.live {
    background: var(--live-red);
  }

  /* No games state */
  .no-games {
    font-size: 2rem;
    font-weight: 200;
    color: var(--text-muted);
    letter-spacing: -0.5px;
  }

  /* Clock */
  .clock-overlay {
    position: fixed;
    top: 50px; right: 60px;
    text-align: right;
    z-index: 100;
  }

  #clock-time {
    font-size: 2rem;
    font-weight: 300;
    color: var(--text-secondary);
    letter-spacing: -1px;
  }

</style>
</head>
<body>

<div id="ambient-bg"></div>
<img id="album-glow" src="" alt="">

<div class="clock-overlay">
  <div id="clock-time">12:00 PM</div>
</div>

<div class="stage">

  <div class="audio-wrap">
    <img id="album-art" src="" alt="Album Art">
    <div class="track-meta">
      <div class="track-title" id="track-title"></div>
      <div class="track-artist" id="track-artist"></div>
    </div>
  </div>

  <div class="schedule-wrap">
    <div class="schedule-header" id="schedule-header"></div>
    <div class="game-carousel" id="game-carousel"></div>
    <div class="schedule-pips" id="schedule-pips"></div>
  </div>

</div>

<script>
  let state = {
    music: { playing: false, song: null },
    games: [],
    currentIndex: 0,
    cycleTimer: null
  };

  const CYCLE_MS = 8000;

  const UI = {
    body: document.body,
    clock: document.getElementById('clock-time'),
    albumArt: document.getElementById('album-art'),
    albumGlow: document.getElementById('album-glow'),
    trackTitle: document.getElementById('track-title'),
    trackArtist: document.getElementById('track-artist'),
    header: document.getElementById('schedule-header'),
    carousel: document.getElementById('game-carousel'),
    pips: document.getElementById('schedule-pips'),
    scheduleWrap: document.querySelector('.schedule-wrap')
  };

  function updateClock() {
    const now = new Date();
    UI.clock.textContent = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }

  function connectWs() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'music') {
        handleMusicUpdate(data);
      } else if (data.type === 'settings') {
        applySettings(data);
      }
    };

    ws.onclose = () => setTimeout(connectWs, 3000);
  }

  function handleMusicUpdate(data) {
    const isPlaying = data.playing && !data.paused;
    const song = data.song;

    if (isPlaying && song) {
      if (!state.music.song || state.music.song.id !== song.id) {
        const artUrl = `/api/music/cover/${song.albumId || song.id}?size=600`;
        UI.albumArt.style.opacity = 0;
        setTimeout(() => {
          UI.albumArt.src = artUrl;
          UI.albumGlow.src = artUrl;
          UI.trackTitle.textContent = song.title;
          UI.trackArtist.textContent = song.artist;
          UI.albumArt.style.opacity = 1;
        }, 500);
      }
      state.music.playing = true;
      state.music.song = song;
      UI.body.classList.add('has-music');
    } else {
      state.music.playing = false;
      UI.body.classList.remove('has-music');
    }
  }

  function applySettings(data) {
    const scale = (data.screensaver_schedule_scale || 100) / 100;
    UI.scheduleWrap.style.transform = `scale(${scale})`;
  }

  async function loadSettings() {
    try {
      const resp = await fetch('/api/settings');
      const data = await resp.json();
      applySettings(data);
    } catch (e) {}
  }

  function formatGameTime(isoString) {
    const d = new Date(isoString);
    return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }

  function buildGameCard(game) {
    const card = document.createElement('div');
    card.className = 'game-card';

    const isLive = game.status === 'live';
    const isFinal = game.status === 'final';
    const showScore = (isLive || isFinal) && game.away_team.score != null && game.home_team.score != null;

    let statusClass = 'scheduled';
    let statusText = formatGameTime(game.start_time);
    if (isLive) {
      statusClass = 'live';
      const inning = game.extra?.current_inning;
      const inningState = game.extra?.inning_state;
      statusText = inning ? `Live \u2022 ${inningState || ''} ${inning}` : 'Live';
    } else if (isFinal) {
      statusClass = 'final';
      statusText = 'Final';
    } else if (game.status === 'pre_game') {
      statusText = formatGameTime(game.start_time) + ' \u2022 Pre-Game';
    } else if (game.status === 'postponed') {
      statusClass = 'final';
      statusText = 'Postponed';
    }

    const awayScore = showScore ? `<div class="team-score">${game.away_team.score}</div>` : '';
    const homeScore = showScore ? `<div class="team-score">${game.home_team.score}</div>` : '';

    let detailParts = [];
    if (game.venue) detailParts.push(game.venue);
    if (game.extra?.national_broadcasts) detailParts.push(game.extra.national_broadcasts);
    const detailHtml = detailParts.length
      ? `<div class="game-detail">${detailParts.join(' \u2022 ')}</div>`
      : '';

    let pitcherHtml = '';
    if (!isLive && !isFinal) {
      const awayP = game.extra?.away_probable_pitcher;
      const homeP = game.extra?.home_probable_pitcher;
      if (awayP && homeP) {
        pitcherHtml = `<div class="game-detail">${awayP} vs ${homeP}</div>`;
      }
    }

    card.innerHTML = `
      <div class="game-scoreboard">
        <div class="team-row">
          <div class="team-abbr">${game.away_team.abbreviation}</div>
          ${awayScore}
        </div>
        <div class="game-divider"></div>
        <div class="team-row">
          <div class="team-abbr">${game.home_team.abbreviation}</div>
          ${homeScore}
        </div>
      </div>
      <div class="game-status ${statusClass}">${statusText}</div>
      ${detailHtml}
      ${pitcherHtml}
    `;

    return card;
  }

  function renderSchedule(games) {
    state.games = games;
    UI.carousel.innerHTML = '';
    UI.pips.innerHTML = '';

    if (games.length === 0) {
      UI.carousel.innerHTML = '<div class="no-games">No games today</div>';
      UI.header.textContent = "MLB Schedule";
      return;
    }

    const now = new Date();
    const dateStr = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
    UI.header.textContent = dateStr + ' \u2022 ' + games.length + ' Game' + (games.length !== 1 ? 's' : '');

    games.forEach((game, i) => {
      const card = buildGameCard(game);
      if (i === state.currentIndex) card.classList.add('active');
      UI.carousel.appendChild(card);

      const pip = document.createElement('div');
      pip.className = 'pip';
      if (i === state.currentIndex) pip.classList.add('active');
      if (game.status === 'live') pip.classList.add('live');
      UI.pips.appendChild(pip);
    });

    startCycle();
  }

  function showGame(index) {
    const cards = UI.carousel.querySelectorAll('.game-card');
    const pips = UI.pips.querySelectorAll('.pip');

    cards.forEach((c, i) => c.classList.toggle('active', i === index));
    pips.forEach((p, i) => p.classList.toggle('active', i === index));

    state.currentIndex = index;
  }

  function startCycle() {
    if (state.cycleTimer) clearInterval(state.cycleTimer);
    if (state.games.length <= 1) return;

    state.cycleTimer = setInterval(() => {
      const next = (state.currentIndex + 1) % state.games.length;
      showGame(next);
    }, CYCLE_MS);
  }

  async function pollGames() {
    try {
      const resp = await fetch('/api/games');
      const games = await resp.json();
      if (Array.isArray(games)) {
        // Clamp index if game list shrunk
        if (state.currentIndex >= games.length) state.currentIndex = 0;
        renderSchedule(games);
      }
    } catch (e) {
      console.error("Schedule poll failed", e);
    }
    setTimeout(pollGames, 60000);
  }

  // Init
  setInterval(updateClock, 1000);
  updateClock();
  loadSettings();
  connectWs();
  pollGames();

</script>
</body>
</html>
