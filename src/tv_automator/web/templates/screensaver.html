<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambient PressBox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #050505;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0a0;
    --text-muted: #404040;
    --accent: #1a9a8a;
    --transition-lazy: all 2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background-color: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }

  /* Ambient Background */
  #ambient-bg {
    position: fixed; inset: 0;
    z-index: 0;
    background: radial-gradient(circle at 50% 50%, #101010 0%, #050505 100%);
    transition: var(--transition-lazy);
  }

  #album-glow {
    position: fixed; inset: -10%;
    z-index: 1;
    opacity: 0;
    filter: blur(120px) saturate(1.8);
    transition: opacity 4s ease;
    object-fit: cover;
    width: 120%; height: 120%;
    animation: slow-glow 60s infinite alternate ease-in-out;
  }

  @keyframes slow-glow {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(2%, 2%) scale(1.1) rotate(2deg); }
  }

  body.has-music #album-glow {
    opacity: 0.15;
  }

  /* Main Stage */
  .stage {
    position: relative;
    z-index: 10;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px;
  }

  /* Audio Side */
  .audio-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 40px;
    opacity: 0;
    transform: translateX(-50px);
    transition: var(--transition-lazy);
    max-width: 0;
    overflow: hidden;
  }

  body.has-music .audio-wrap {
    opacity: 1;
    transform: translateX(0);
    max-width: 600px;
    margin-right: 100px;
  }

  #album-art {
    width: 500px; height: 500px;
    border-radius: 8px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.9);
    object-fit: cover;
    transition: opacity 1.5s ease;
  }

  .track-meta {
    max-width: 500px;
  }

  .track-title {
    font-size: 2.8rem;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.03em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-artist {
    font-size: 1.6rem;
    color: var(--text-secondary);
    font-weight: 400;
  }

  /* MLB Dashboard (Shared) */
  .mlb-dashboard {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    transition: var(--transition-lazy);
  }

  body.has-music .mlb-dashboard { margin-left: 50px;
    align-items: flex-end;
    text-align: right;
  }

  /* Components */
  .diamond {
    position: relative;
    width: 140px; height: 140px;
    margin-bottom: 50px;
    transform: rotate(45deg);
    transition: var(--transition-lazy);
  }

  body.has-music .diamond {
    width: 120px; height: 120px;
    margin-bottom: 30px;
  }

  .base {
    position: absolute;
    width: 38px; height: 38px;
    border: 2px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.02);
    transition: var(--transition-lazy);
  }

  body.has-music .base {
    width: 28px; height: 28px;
  }

  .base.active {
    background: var(--text-primary);
    border-color: var(--text-primary);
    box-shadow: 0 0 30px rgba(255,255,255,0.3);
  }

  .base-1 { top: 0; right: 0; }
  .base-2 { top: 0; left: 0; }
  .base-3 { bottom: 0; left: 0; }
  .home-plate {
    bottom: 4px; right: 4px;
    width: 30px; height: 30px;
    border-color: rgba(255,255,255,0.05);
  }
  body.has-music .home-plate { width: 22px; height: 22px; }

  .mlb-info {
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: var(--transition-lazy);
  }

  .inning-text {
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .count-text {
    font-size: 5rem;
    font-weight: 200;
    letter-spacing: -3px;
    line-height: 1;
    color: var(--text-primary);
    transition: var(--transition-lazy);
  }

  body.has-music .count-text {
    font-size: 3.5rem;
  }

  .matchup-text {
    font-size: 2rem;
    font-weight: 400;
    color: var(--text-secondary);
    transition: var(--transition-lazy);
    margin-top: 10px;
  }

  body.has-music .matchup-text {
    font-size: 1.4rem;
    margin-top: 5px;
  }

  .matchup-text span {
    color: var(--text-muted);
    font-size: 1.2rem;
    margin: 0 12px;
  }

  /* Deep Dive Extras (Hidden in Music State) */
  .deep-extras {
    margin-top: 60px;
    width: 100%;
    max-width: 800px;
    opacity: 1;
    transform: translateY(0);
    transition: var(--transition-lazy);
  }

  body.has-music .deep-extras {
    opacity: 0;
    transform: translateY(40px);
    pointer-events: none;
    max-height: 0;
    margin: 0;
  }

  .pitch-history {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 50px;
  }

  .pitch-pill {
    padding: 10px 20px;
    border-radius: 30px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 1rem;
    color: var(--text-secondary);
  }

  .linescore-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 1.3rem;
  }

  .linescore-table th, .linescore-table td {
    padding: 16px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .linescore-table .team-abbr {
    text-align: left;
    font-weight: 700;
    color: var(--text-primary);
    width: 80px;
  }

  .linescore-table .total {
    font-weight: 700;
    color: var(--accent);
    width: 60px;
  }

  .linescore-table .muted {
    color: var(--text-muted);
  }

  /* Clock */
  .clock-overlay {
    position: fixed;
    top: 50px; right: 60px;
    text-align: right;
    z-index: 100;
  }

  #clock-time {
    font-size: 2rem;
    font-weight: 300;
    color: var(--text-secondary);
    letter-spacing: -1px;
  }

</style>
</head>
<body>

<div id="ambient-bg"></div>
<img id="album-glow" src="" alt="">

<div class="clock-overlay">
  <div id="clock-time">12:00 PM</div>
</div>

<div class="stage">

  <div class="audio-wrap">
    <img id="album-art" src="" alt="Album Art">
    <div class="track-meta">
      <div class="track-title" id="track-title"></div>
      <div class="track-artist" id="track-artist"></div>
    </div>
  </div>

  <div class="mlb-dashboard">
    <div class="diamond">
      <div class="base base-1" id="base-1"></div>
      <div class="base base-2" id="base-2"></div>
      <div class="base base-3" id="base-3"></div>
      <div class="base home-plate"></div>
    </div>

    <div class="mlb-info">
      <div class="inning-text" id="inning"></div>
      <div class="count-text" id="count"></div>
      <div class="matchup-text" id="matchup"></div>
    </div>

    <div class="deep-extras">
      <div class="pitch-history" id="pitch-history">
        <!-- Last 3-5 pitches -->
      </div>

      <table class="linescore-table">
        <thead id="ls-head"></thead>
        <tbody id="ls-body"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  let state = {
    music: { playing: false, song: null },
    mlb: { game_id: null, data: null }
  };

  const UI = {
    body: document.body,
    clock: document.getElementById('clock-time'),
    albumArt: document.getElementById('album-art'),
    albumGlow: document.getElementById('album-glow'),
    trackTitle: document.getElementById('track-title'),
    trackArtist: document.getElementById('track-artist'),
    pitches: document.getElementById('pitch-history'),
    lsHead: document.getElementById('ls-head'),
    lsBody: document.getElementById('ls-body'),

    bases: [document.getElementById('base-1'), document.getElementById('base-2'), document.getElementById('base-3')],
    inning: document.getElementById('inning'),
    count: document.getElementById('count'),
    matchup: document.getElementById('matchup')
  };

  function updateClock() {
    const now = new Date();
    UI.clock.textContent = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }

  let musicUpdateTimeout = null;

  function connectWs() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'music') {
          handleMusicUpdate(data);
        }
      } catch (err) {
        console.warn('Ignoring invalid WebSocket frame', err);
      }
    };

    ws.onclose = () => setTimeout(connectWs, 3000);
  }

  function handleMusicUpdate(data) {
    const isPlaying = data.playing && !data.paused;
    const song = data.song;

    if (isPlaying && song) {
      if (!state.music.song || state.music.song.id !== song.id) {
        const artUrl = `/api/music/cover/${song.albumId || song.id}?size=600`;

        if (musicUpdateTimeout) clearTimeout(musicUpdateTimeout);

        // Subtle crossfade for art
        UI.albumArt.style.opacity = 0;
        musicUpdateTimeout = setTimeout(() => {
          UI.albumArt.src = artUrl;
          UI.albumGlow.src = artUrl;
          UI.trackTitle.textContent = song.title;
          UI.trackArtist.textContent = song.artist;
          UI.albumArt.style.opacity = 1;
          musicUpdateTimeout = null;
        }, 500);
      }
      state.music.playing = true;
      state.music.song = song;
      UI.body.classList.add('has-music');
    } else {
      state.music.playing = false;
      UI.body.classList.remove('has-music');
    }
  }

  async function pollMLB() {
    try {
      const resp = await fetch('/api/pitches');
      if (resp.ok) {
        const data = await resp.json();
        if (data && data.game_id) {
          updateMLBUI(data);
        } else {
          clearMLBUI();
        }
      }
    } catch (e) {
      console.error("MLB poll failed", e);
    }
    setTimeout(pollMLB, 3000);
  }

  function clearMLBUI() {
    UI.bases.forEach(b => b.classList.remove('active'));
    UI.inning.textContent = "";
    UI.count.textContent = "";
    UI.matchup.replaceChildren();
    UI.pitches.innerHTML = "";
    UI.lsHead.innerHTML = "";
    UI.lsBody.innerHTML = "";
  }

  function updateMLBUI(data) {
    const { runners, count, inning, pitcher, batter, pitches, linescore, score } = data;

    // Update bases
    UI.bases[0].classList.toggle('active', !!runners.first);
    UI.bases[1].classList.toggle('active', !!runners.second);
    UI.bases[2].classList.toggle('active', !!runners.third);

    // Update text fields
    UI.inning.textContent = inning;
    UI.count.textContent = count;

    // XSS safe matchup update
    UI.matchup.replaceChildren();
    UI.matchup.appendChild(document.createTextNode(`${pitcher} `));
    const vs = document.createElement('span');
    vs.textContent = 'VS';
    UI.matchup.appendChild(vs);
    UI.matchup.appendChild(document.createTextNode(` ${batter}`));

    // Update expanded pitches (only used in Deep Dive)
    UI.pitches.replaceChildren();
    if (pitches && pitches.length > 0) {
      const lastPitches = pitches.slice(-5).reverse();
      lastPitches.forEach(p => {
        const pill = document.createElement('div');
        pill.className = 'pitch-pill';
        pill.textContent = `${p.pitchType} - ${p.speed_mph}mph - ${p.call}`;
        UI.pitches.appendChild(pill);
      });
    }

    // Update linescore
    if (linescore && linescore.length > 0) {
      const inningsCount = Math.max(9, linescore.length);

      // Header
      const headTr = document.createElement('tr');
      const emptyTh = document.createElement('th');
      emptyTh.className = 'team-abbr';
      headTr.appendChild(emptyTh);

      for(let i=1; i<=inningsCount; i++) {
        const th = document.createElement('th');
        th.className = 'muted';
        th.textContent = i;
        headTr.appendChild(th);
      }
      const totalTh = document.createElement('th');
      totalTh.className = 'total';
      totalTh.textContent = 'R';
      headTr.appendChild(totalTh);
      UI.lsHead.replaceChildren(headTr);

      // Rows
      const createRow = (abbr, teamScore, key) => {
        const tr = document.createElement('tr');
        const tdAbbr = document.createElement('td');
        tdAbbr.className = 'team-abbr';
        tdAbbr.textContent = abbr;
        tr.appendChild(tdAbbr);

        for(let i=0; i<inningsCount; i++) {
          const td = document.createElement('td');
          const inn = linescore[i] || {};
          const val = inn[key];
          if (val === undefined || val === null) {
            td.className = 'muted';
          } else {
            td.textContent = val;
          }
          tr.appendChild(td);
        }
        const tdTotal = document.createElement('td');
        tdTotal.className = 'total';
        tdTotal.textContent = teamScore;
        tr.appendChild(tdTotal);
        return tr;
      };

      UI.lsBody.replaceChildren(
        createRow(score.away_abbr, score.away, 'away'),
        createRow(score.home_abbr, score.home, 'home')
      );
    } else {
      UI.lsHead.innerHTML = "";
      UI.lsBody.innerHTML = "";
    }
  }

  // Init
  setInterval(updateClock, 1000);
  updateClock();
  connectWs();
  pollMLB();

</script>
</body>
</html>
