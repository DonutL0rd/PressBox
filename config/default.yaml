# TV-Automator Default Configuration

display:
  resolution: "1920x1080"
  fullscreen: true

browser:
  # Chrome flags for kiosk/appliance mode
  args:
    - "--kiosk"
    - "--no-first-run"
    - "--disable-infobars"
    - "--disable-session-crashed-bubble"
    - "--disable-features=TranslateUI"
    - "--autoplay-policy=no-user-gesture-required"
  # Seconds to wait for page loads
  timeout: 30

providers:
  mlb:
    enabled: true
    # Favorite teams (3-letter codes: NYY, LAD, PHI, etc.)
    favorite_teams: []
    # Auto-start games for favorite teams
    auto_start: false

scheduler:
  # How often to poll for game updates (seconds)
  poll_interval: 60
  # Minutes before game start to begin setup
  pre_game_minutes: 5

cec:
  enabled: false
  power_off_on_stop: true

navidrome:
  server_url: ""
  username: ""
  password: ""

data_dir: "/data"
